<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Ultimate</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
color:white;
background:
radial-gradient(circle at 30% 30%, #1a1a1a, #000),
repeating-linear-gradient(45deg,#111 0,#111 8px,#000 8px,#000 16px);
}

canvas{display:block;}

/* スコア */
#ui{
position:absolute;
top:10px;
left:15px;
font-size:22px;
font-weight:bold;
text-shadow:2px 2px 5px black;
}

/* 🎮 コントローラー（十字キー） */
#pad{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
width:220px;
height:220px;
}

.btn{
position:absolute;
width:70px;
height:70px;
border-radius:15px;
background:rgba(255,255,255,0.15);
border:2px solid rgba(255,255,255,0.4);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
backdrop-filter:blur(6px);
}

/* 十字配置 */
.up{top:0;left:75px;}
.down{bottom:0;left:75px;}
.left{left:0;top:75px;}
.right{right:0;top:75px;}
</style>
</head>

<body>

<div id="ui"></div>
<canvas id="game"></canvas>

<div id="pad">
<div class="btn up">⬆️</div>
<div class="btn down">⬇️</div>
<div class="btn left">⬅️</div>
<div class="btn right">➡️</div>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let grid=Math.floor(canvas.width/21);

// 状態
let state="title";
let score=0;
let stage=1;
let life=3;
let speed=220;

let pac={x:1,y:1,dx:0,dy:0,anim:0};
let ghosts=[];
let foods=[];
let map=[];
let power=false;
let powerTimer=0;

// マップ
const base=[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o###.###.#.###.###o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.### # ###.#####",
"#.........P.........#",
"#...................#",
"#.###.#####.#####.###",
"#o.................o#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.######### #########",
"#...................#",
"#.###.###.#.###.###.#",
"#.........#.........#",
"#####################"
];

// 初期化
function init(){

map=[...base];
foods=[];

ghosts=[
{x:10,y:8,c:"red"},
{x:9,y:8,c:"pink"},
{x:11,y:8,c:"cyan"},
{x:10,y:7,c:"orange"}
];

map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="."||c==="o") foods.push({x,y,p:c==="o"});
if(c==="P"){pac.x=x;pac.y=y;}
});
});
}

// 操作
document.querySelector(".up").onclick=()=>{pac.dx=0;pac.dy=-1;}
document.querySelector(".down").onclick=()=>{pac.dx=0;pac.dy=1;}
document.querySelector(".left").onclick=()=>{pac.dx=-1;pac.dy=0;}
document.querySelector(".right").onclick=()=>{pac.dx=1;pac.dy=0;}

// 壁
function wall(x,y){
if(y<0||y>=map.length)return true;
if(x<0||x>=map[0].length)return true;
return map[y][x]==="#";
}

// 移動
function move(o){
let nx=o.x+o.dx;
let ny=o.y+o.dy;

if(nx<0) nx=map[0].length-1;
if(nx>=map[0].length) nx=0;

if(!wall(nx,ny)){
o.x=nx;
o.y=ny;
}
}

// AI
function getTarget(g){
if(power) return {x:1,y:1};
return {x:pac.x,y:pac.y};
}

// 更新
function update(){

if(state==="title") return;

move(pac);

// 食べ物
foods=foods.filter(f=>{
if(f.x===pac.x&&f.y===pac.y){

score+=f.p?50:10;

if(f.p){
power=true;
powerTimer=50;
}

return false;
}
return true;
});

// パワー時間
if(power){
powerTimer--;
if(powerTimer<=0) power=false;
}

// ゴースト
ghosts.forEach(g=>{

let target=getTarget(g);

let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
let best=null;
let bestD=9999;

for(let d of dirs){

let nx=g.x+d[0];
let ny=g.y+d[1];

if(wall(nx,ny)) continue;

let dist=Math.abs(target.x-nx)+Math.abs(target.y-ny);

if(dist<bestD){
bestD=dist;
best=d;
}
}

if(best){
g.dx=best[0];
g.dy=best[1];
}

move(g);

// 衝突
if(g.x===pac.x&&g.y===pac.y){

if(power){
g.x=10; g.y=8;
score+=200;
}else{
life--;
pac.x=1; pac.y=1;
if(life<=0) state="title";
}
}

});

// クリア
if(foods.length===0){
stage++;
init();
}

}

// 描画
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="title"){
ctx.fillStyle="yellow";
ctx.font="bold 48px sans-serif";
ctx.fillText("PAC-MAN",canvas.width/2-120,200);
ctx.font="20px sans-serif";
ctx.fillText("TAP TO START",canvas.width/2-80,250);
return;
}

let ox=(canvas.width-map[0].length*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

// 壁（レンガ）
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){
ctx.fillStyle="#8B4513";
ctx.fillRect(ox+x*grid,oy+y*grid,grid,grid);
ctx.strokeStyle="#5a2d0c";
ctx.strokeRect(ox+x*grid,oy+y*grid,grid,grid);
}
});
});

// 食べ物
foods.forEach(f=>{
ctx.fillStyle=f.p?"yellow":"white";
ctx.beginPath();
ctx.arc(ox+f.x*grid+grid/2,oy+f.y*grid+grid/2,grid*0.25,0,Math.PI*2);
ctx.fill();
});

// パックマン（口アニメ）
pac.anim+=0.2;
let mouth=Math.abs(Math.sin(pac.anim))*0.5;

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.moveTo(ox+pac.x*grid+grid/2,oy+pac.y*grid+grid/2);
ctx.arc(
ox+pac.x*grid+grid/2,
oy+pac.y*grid+grid/2,
grid*0.45,
mouth,
Math.PI*2-mouth
);
ctx.fill();

// ゴースト
ghosts.forEach(g=>{
ctx.fillStyle=power?"blue":g.c;
ctx.beginPath();
ctx.arc(ox+g.x*grid+grid/2,oy+g.y*grid+grid/2,grid*0.45,0,Math.PI*2);
ctx.fill();
});

// UI
document.getElementById("ui").innerText=
`Score:${score}  Life:${life}  Stage:${stage}`;

}

// ループ
setInterval(()=>{
update();
draw();
},speed);

// スタート
canvas.addEventListener("touchstart",()=>{
if(state==="title"){
init();
state="play";
}
});

</script>
</body>
</html>
