<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Ultimate Complete</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:black;
color:white;
}

canvas{display:block;}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:28px;
font-weight:bold;
}

#life{
position:absolute;
top:50px;
left:10px;
font-size:28px;
}

#pad{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:260px;
height:260px;
}

.btn{
position:absolute;
width:90px;
height:90px;
border-radius:20px;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
}

.up{top:0;left:85px;}
.down{bottom:0;left:85px;}
.left{left:0;top:85px;}
.right{right:0;top:85px;}
</style>
</head>

<body>

<div id="ui"></div>
<div id="life"></div>

<canvas id="game"></canvas>

<div id="pad">
<div class="btn up">⬆️</div>
<div class="btn down">⬇️</div>
<div class="btn left">⬅️</div>
<div class="btn right">➡️</div>
</div>

<script>

// ===== 基本 =====
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let grid=Math.floor(canvas.width/21);

// ===== 音 =====
const audio=new (window.AudioContext||window.webkitAudioContext)();

function play(f){
let o=audio.createOscillator();
o.frequency.value=f;
o.connect(audio.destination);
o.start();
setTimeout(()=>o.stop(),80);
}

// BGM
let bgm;
function startBGM(){
bgm=setInterval(()=>{
play(300);
setTimeout(()=>play(500),100);
setTimeout(()=>play(700),200);
},600);
}
function stopBGM(){ clearInterval(bgm); }

// ===== 状態 =====
let state="title";
let stage=0;
let score=0;
let life=5;

let pac={x:1,y:1,dx:0,dy:0,dir:0,anim:0};
let ghosts=[];
let foods=[];
let map=[];

// ===== ステージ（全21幅統一）=====
const stages=[

[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o........P........o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.###.#.###.#####",
"#...................#",
"#####################"
],

[
"#####################",
"#...................#",
"#.#####.###.#####.#.#",
"#....P............#.#",
"#.#####.###.#####.#.#",
"#...................#",
"#.#####.###.#####.#.#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#..#.....#.....#....#",
"#..#.###.#.###.#.##.#",
"#P.................o#",
"#..#.###.#.###.#.##.#",
"#..#.....#.....#....#",
"#..#####.#.#####....#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#...................#",
"#.###.#####.###.###.#",
"#P.................o#",
"#.###.#####.###.###.#",
"#...................#",
"#.###.#####.###.###.#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#.#.#.#.#.#.#.#.#.#.#",
"#........P.........o#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#####################"
]

];

// ===== 初期化 =====
function init(){
map=[...stages[stage]];
foods=[];
ghosts=[
{x:10,y:3,dx:1,dy:0},
{x:9,y:3,dx:-1,dy:0}
];

map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="."||c==="o") foods.push({x,y});
if(c==="P"){pac.x=x;pac.y=y;}
});
});
}

// ===== 壁 =====
function wall(x,y){
if(y<0||y>=map.length)return true;
if(x<0||x>=map[0].length)return true;
return map[y][x]==="#";
}

// ===== 移動 =====
function move(o){
let nx=o.x+o.dx;
let ny=o.y+o.dy;

// ワープ
if(nx<0) nx=map[0].length-1;
if(nx>=map[0].length) nx=0;

if(!wall(nx,ny)){
o.x=nx;
o.y=ny;
}
}

// ===== 更新 =====
function update(){

if(state==="title") return;

move(pac);

// 方向
if(pac.dx===1) pac.dir=0;
if(pac.dx===-1) pac.dir=Math.PI;
if(pac.dy===1) pac.dir=Math.PI/2;
if(pac.dy===-1) pac.dir=-Math.PI/2;

// 食べ物
foods=foods.filter(f=>{
if(f.x===pac.x&&f.y===pac.y){
score+=10;
play(700);
return false;
}
return true;
});

// ゴースト
ghosts.forEach(g=>{

// AI（追尾＋ランダム）
if(Math.random()<0.3){
let d=[[1,0],[-1,0],[0,1],[0,-1]];
let r=d[Math.floor(Math.random()*4)];
g.dx=r[0]; g.dy=r[1];
}else{
g.dx=Math.sign(pac.x-g.x);
g.dy=Math.sign(pac.y-g.y);
}

move(g);

// 衝突
if(g.x===pac.x&&g.y===pac.y){
life--;
play(200);

if(life<=0){
state="title";
life=5;
score=0;
stage=0;
stopBGM();
}else{
pac.x=1; pac.y=1;
}
}

});

// クリア
if(foods.length===0){
play(1000);
stage=(stage+1)%5;
init();
}

}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="title"){
ctx.fillStyle="yellow";
ctx.font=(canvas.width*0.6)+"px sans-serif";
ctx.fillText("PAC",canvas.width*0.1,200);

ctx.font=(canvas.width*0.3)+"px sans-serif";
ctx.fillText("TAP",canvas.width*0.2,350);
return;
}

let ox=(canvas.width-map[0].length*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

// 壁
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){
ctx.fillStyle="blue";
ctx.fillRect(ox+x*grid,oy+y*grid,grid,grid);
}
});
});

// エサ
foods.forEach(f=>{
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ox+f.x*grid+grid/2,oy+f.y*grid+grid/2,grid*0.25,0,Math.PI*2);
ctx.fill();
});

// パックマン（口）
pac.anim+=0.2;
let m=Math.abs(Math.sin(pac.anim))*0.5;

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.moveTo(ox+pac.x*grid+grid/2,oy+pac.y*grid+grid/2);
ctx.arc(
ox+pac.x*grid+grid/2,
oy+pac.y*grid+grid/2,
grid*0.45,
pac.dir+m,
pac.dir+Math.PI*2-m
);
ctx.fill();

// ゴースト
ghosts.forEach(g=>{
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(ox+g.x*grid+grid/2,oy+g.y*grid+grid/2,grid*0.45,0,Math.PI*2);
ctx.fill();
});

// UI
document.getElementById("ui").innerText=
"Score:"+score+"  Stage:"+(stage+1);

let h="";
for(let i=0;i<life;i++) h+="❤️";
document.getElementById("life").innerText=h;

}

// ===== ループ =====
setInterval(()=>{
update();
draw();
},180);

// ===== スタート =====
canvas.addEventListener("touchstart",()=>{
if(state==="title"){
play(900);
init();
state="play";
startBGM();
}
});

// ===== 操作 =====
document.querySelector(".up").onclick=()=>{pac.dx=0;pac.dy=-1;}
document.querySelector(".down").onclick=()=>{pac.dx=0;pac.dy=1;}
document.querySelector(".left").onclick=()=>{pac.dx=-1;pac.dy=0;}
document.querySelector(".right").onclick=()=>{pac.dx=1;pac.dy=0;}

</script>
</body>
</html>
