<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Brick Edition</title>

<style>
body{
margin:0;
background:#111;
overflow:hidden;
font-family:sans-serif;
color:white;
}

/* タイトル */
#title{
position:absolute;
top:30%;
width:100%;
text-align:center;
z-index:10;
}
#title h1{
font-size:12vw;
color:#FFD700;
margin:0;
}
#title button{
font-size:6vw;
padding:10px 20px;
margin-top:20px;
}

/* UI */
#ui{
position:absolute;
top:10px;
left:10px;
z-index:10;
font-size:18px;
}

/* コントローラー */
#pad{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
width:240px;
height:240px;
z-index:10;
}
.btn{
position:absolute;
width:80px;
height:80px;
background:#333;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
}
.up{top:0;left:80px;}
.down{bottom:0;left:80px;}
.left{left:0;top:80px;}
.right{right:0;top:80px;}

canvas{
position:absolute;
top:0;
left:0;
}
</style>
</head>

<body>

<div id="title">
<h1>PACMAN</h1>
<button id="startBtn">Game Start</button>
</div>

<div id="ui">
<div id="score"></div>
<div id="life"></div>
<div id="hi"></div>
<button id="reset">リセット</button>
</div>

<canvas id="game"></canvas>

<div id="pad">
<div class="btn up">⬆️</div>
<div class="btn down">⬇️</div>
<div class="btn left">⬅️</div>
<div class="btn right">➡️</div>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

// ===== BGM =====
const bgm=new Audio("bgm.mp3");
bgm.loop=true;

// ===== 状態 =====
let state="title";
let score=0;
let hi=localStorage.getItem("hi")||0;
let life=5;
let stage=0;

let pac={x:1,y:1,dx:0,dy:0};
let foods=[];
let ghosts=[];
let map=[];

// ===== 5ステージ（全部同じ幅）=====
const stages=[

[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o........P........o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.###.#.###.#####",
"#...................#",
"#####################"
],

[
"#####################",
"#...................#",
"#.#####.###.#####.#.#",
"#....P............#.#",
"#.#####.###.#####.#.#",
"#...................#",
"#.#####.###.#####.#.#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#..#.....#.....#....#",
"#..#.###.#.###.#.##.#",
"#P.................o#",
"#..#.###.#.###.#.##.#",
"#..#.....#.....#....#",
"#..#####.#.#####....#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#...................#",
"#.###.#####.###.###.#",
"#P.................o#",
"#.###.#####.###.###.#",
"#...................#",
"#.###.#####.###.###.#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#.#.#.#.#.#.#.#.#.#.#",
"#........P.........o#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#####################"
]

];

// ===== 初期化 =====
function init(){
map=[...stages[stage]];
foods=[];
ghosts=[{x:10,y:3}];

map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="."||c==="o") foods.push({x,y});
if(c==="P"){pac.x=x;pac.y=y;}
});
});
}

// ===== 壁 =====
function wall(x,y){
return map[y][x]==="#";
}

// ===== 移動 =====
function move(o){
let nx=o.x+o.dx;
let ny=o.y+o.dy;

if(nx<0) nx=20;
if(nx>20) nx=0;

if(!wall(nx,ny)){
o.x=nx;
o.y=ny;
}
}

// ===== 更新 =====
function update(){

if(state!=="play") return;

move(pac);

// 食べ物
foods=foods.filter(f=>{
if(f.x===pac.x&&f.y===pac.y){
score+=10;
return false;
}
return true;
});

// ゴースト
ghosts.forEach(g=>{
g.x+=Math.sign(pac.x-g.x);
g.y+=Math.sign(pac.y-g.y);

if(g.x===pac.x&&g.y===pac.y){
life--;

if(life<=0){
if(score>hi){
hi=score;
localStorage.setItem("hi",hi);
}
state="title";
life=5;
score=0;
stage=0;
bgm.pause();
document.getElementById("title").style.display="block";
}else{
pac.x=1;pac.y=1;
}
}
});

// クリア
if(foods.length===0){
stage=(stage+1)%5;
init();
}

}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="title") return;

// ⭐ 正しいサイズ計算（これが超重要）
let grid=Math.min(
Math.floor(canvas.width/21),
Math.floor(canvas.height/map.length)
);

let ox=(canvas.width-21*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

// ===== 壁（レンガ調）=====
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){

let px=ox+x*grid;
let py=oy+y*grid;

// ベース
ctx.fillStyle="#8B4513";
ctx.fillRect(px,py,grid,grid);

// 模様
ctx.fillStyle="#A0522D";
ctx.fillRect(px,py,grid,grid/2);

ctx.strokeStyle="#5a2d0c";
ctx.strokeRect(px,py,grid,grid);

}
});
});

// エサ
foods.forEach(f=>{
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ox+f.x*grid+grid/2,oy+f.y*grid+grid/2,grid*0.2,0,Math.PI*2);
ctx.fill();
});

// パックマン
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(ox+pac.x*grid+grid/2,oy+pac.y*grid+grid/2,grid*0.4,0,Math.PI*2);
ctx.fill();

// UI
document.getElementById("score").innerText="Score:"+score+" Stage:"+(stage+1);
document.getElementById("life").innerText="❤️".repeat(life);
document.getElementById("hi").innerText="HI:"+hi;

}

// ===== ループ =====
setInterval(()=>{
update();
draw();
},180);

// ===== 操作 =====
document.querySelector(".up").onclick=()=>{pac.dx=0;pac.dy=-1;}
document.querySelector(".down").onclick=()=>{pac.dx=0;pac.dy=1;}
document.querySelector(".left").onclick=()=>{pac.dx=-1;pac.dy=0;}
document.querySelector(".right").onclick=()=>{pac.dx=1;pac.dy=0;}

// ===== スタート =====
document.getElementById("startBtn").onclick=()=>{
init();
state="play";
bgm.play();
document.getElementById("title").style.display="none";
};

// ===== リセット =====
document.getElementById("reset").onclick=()=>{
localStorage.removeItem("hi");
hi=0;
};

</script>
</body>
</html>
