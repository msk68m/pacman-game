<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Full</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
color:white;
}

canvas{
display:block;
}

#ui{
position:fixed;
top:10px;
left:10px;
font-size:24px;
font-weight:bold;
}

/* コントローラー */
#pad{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:none;
}

.btn{
width:80px;
height:80px;
margin:12px;
border-radius:20px;
background:rgba(255,255,255,0.15);
border:2px solid #aaa;
font-size:32px;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

.row{
display:flex;
justify-content:center;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<div id="pad">
<div class="row"><div class="btn" id="up">▲</div></div>
<div class="row">
<div class="btn" id="left">◀</div>
<div class="btn" id="down">▼</div>
<div class="btn" id="right">▶</div>
</div>
</div>

<script>

// ===== 基本 =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== マップ =====
const mapData = [
"#####################",
"#P........#.........#",
"#.###.###.#.###.###.#",
"#o###.###.#.###.###o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.### # ###.#####",
"#...................#",
"#.###.#####.#####.###",
"#o.................o#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.######### #########",
"#...................#",
"#.###.###.#.###.###.#",
"#.........#.........#",
"#####################"
];

let map=[...mapData];

// ===== スケーリング（ここが重要）=====
let grid;
function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

grid = Math.floor(
Math.min(
canvas.width / map[0].length,
canvas.height / map.length
)
);
}
resize();
window.onresize=resize;

// ===== 状態 =====
let state="title";
let score=0;
let life=5;

let pac={x:1,y:1,dx:0,dy:0};
let nextDir={x:0,y:0};

let foods=[];
let ghosts=[];
let power=0;

// ===== 初期化 =====
function init(){

foods=[];
ghosts=[
{x:10,y:8},
{x:9,y:8}
];

map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="."||c==="o") foods.push({x,y,p:c==="o"});
if(c==="P"){pac.x=x;pac.y=y;}
});
});
}

// ===== 壁 =====
function wall(x,y){
return map[y][x]==="#";
}

// ===== 移動（予約対応）=====
function move(){

// 次の方向に行けるなら即変更
if(!wall(pac.x+nextDir.x,pac.y+nextDir.y)){
pac.dx=nextDir.x;
pac.dy=nextDir.y;
}

let nx=pac.x+pac.dx;
let ny=pac.y+pac.dy;

if(!wall(nx,ny)){
pac.x=nx;
pac.y=ny;
}
}

// ===== 更新 =====
function update(){

if(state==="title") return;

move();

// 食べる
foods=foods.filter(f=>{
if(f.x===pac.x && f.y===pac.y){
score+=10;
if(f.p) power=200;
return false;
}
return true;
});

// ゴースト
ghosts.forEach(g=>{
let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
let d=dirs[Math.floor(Math.random()*4)];

if(!wall(g.x+d[0],g.y+d[1])){
g.x+=d[0];
g.y+=d[1];
}

// 衝突
if(g.x===pac.x && g.y===pac.y){
if(power>0){
g.x=10; g.y=8;
score+=200;
}else{
life--;
init();
if(life<=0){
state="title";
life=5;
score=0;
}
}
}
});

if(power>0) power--;
}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// 中央配置
let ox=(canvas.width-map[0].length*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

if(state==="title"){
ctx.fillStyle="yellow";
ctx.font="bold 60px sans-serif";
ctx.fillText("PACMAN",canvas.width/2-120,200);
ctx.fillText("TAP TO START",canvas.width/2-140,260);
return;
}

// 壁
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){
ctx.fillStyle="blue";
ctx.fillRect(ox+x*grid,oy+y*grid,grid,grid);
}
});
});

// 餌（2倍）
foods.forEach(f=>{
ctx.fillStyle=f.p?"orange":"white";
ctx.beginPath();
ctx.arc(
ox+f.x*grid+grid/2,
oy+f.y*grid+grid/2,
f.p?grid/3:grid/6,
0,Math.PI*2
);
ctx.fill();
});

// パックマン（2倍＋向き）
let angle=0;
if(pac.dx===1) angle=0;
if(pac.dx===-1) angle=Math.PI;
if(pac.dy===1) angle=Math.PI/2;
if(pac.dy===-1) angle=-Math.PI/2;

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.moveTo(
ox+pac.x*grid+grid/2,
oy+pac.y*grid+grid/2
);
ctx.arc(
ox+pac.x*grid+grid/2,
oy+pac.y*grid+grid/2,
grid/2.2,
angle+0.3,
angle-0.3+Math.PI*2
);
ctx.fill();

// ゴースト（2倍）
ghosts.forEach(g=>{
ctx.fillStyle=power>0?"blue":"red";
ctx.beginPath();
ctx.arc(
ox+g.x*grid+grid/2,
oy+g.y*grid+grid/2,
grid/2.2,
0,Math.PI*2
);
ctx.fill();
});

// UI
document.getElementById("ui").innerHTML =
"Score:"+score+"<br>"+("❤️".repeat(life));
}

// ===== ループ =====
setInterval(()=>{
update();
draw();
},120);

// ===== 操作 =====
document.getElementById("up").onclick=()=>nextDir={x:0,y:-1};
document.getElementById("down").onclick=()=>nextDir={x:0,y:1};
document.getElementById("left").onclick=()=>nextDir={x:-1,y:0};
document.getElementById("right").onclick=()=>nextDir={x:1,y:0};

// スタート
canvas.addEventListener("touchstart",()=>{
if(state==="title"){
state="play";
document.getElementById("pad").style.display="block";
init();
}
});

</script>
</body>
</html>
