<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Final Stable</title>

<style>
body{margin:0;background:black;overflow:hidden;color:white;font-family:sans-serif;}
canvas{display:block;}

/* コントローラー */
#pad{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
width:260px;height:260px;
display:none;
}
.btn{
position:absolute;width:80px;height:80px;
border-radius:20px;
background:rgba(255,255,255,0.15);
display:flex;align-items:center;justify-content:center;
font-size:30px;
}
.up{top:0;left:90px;}
.down{bottom:0;left:90px;}
.left{left:0;top:90px;}
.right{right:0;top:90px;}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="pad">
<div class="btn up">▲</div>
<div class="btn down">▼</div>
<div class="btn left">◀</div>
<div class="btn right">▶</div>
</div>

<script>

// ===== 基本 =====
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let grid=Math.floor(canvas.width/21);

// ===== 状態 =====
let state="title";
let score=0;
let life=5;
let stage=0;

let pac={x:1,y:1,dx:0,dy:0,dir:0};
let nextDir={dx:0,dy:0};

let ghosts=[];
let foods=[];
let powers=[];
let map=[];

let powerMode=false;
let powerTimer=0;

// ===== 5面（絶対維持）=====
const stages=[

[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o###.###.#.###.###o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.###   ###.#####",
"#.........P.........#",
"#...................#",
"#.###.#####.#####.###",
"#o.................o#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.######### #########",
"#...................#",
"#.###.###.#.###.###.#",
"#.........#.........#",
"#####################"
],

[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o.................o#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.######### #########",
"#.........P.........#",
"#.######### #########",
"#.....#...#...#.....#",
"#.###.#.#####.#.###.#",
"#o.................o#",
"#.###.###.#.###.###.#",
"#.........#.........#",
"#####################"
],

[
"#####################",
"#o.................o#",
"#.###.#####.#####.###",
"#.....#...#...#.....#",
"#.###.#.#####.#.###.#",
"#.........P.........#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.###.#####.#####.###",
"#o.................o#",
"#####################"
],

[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o.................o#",
"#.###.#.#####.#.###.#",
"#.....#...P...#.....#",
"#.######### #########",
"#...................#",
"#.######### #########",
"#.....#.....#.......#",
"#.###.#.#####.#.###.#",
"#o.................o#",
"#.###.###.#.###.###.#",
"#.........#.........#",
"#####################"
],

[
"#####################",
"#o.................o#",
"#.###.#####.#####.###",
"#.....#...#...#.....#",
"#.###.#.#####.#.###.#",
"#.........P.........#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.###.#####.#####.###",
"#o.................o#",
"#####################"
]

];

// ===== 初期化 =====
function init(){

map=[...stages[stage]];
foods=[];
powers=[];
ghosts=[
{x:10,y:8},{x:9,y:8},{x:11,y:8}
];

// エサ生成
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="."||c==="o") foods.push({x,y});
if(c==="P"){pac.x=x;pac.y=y;}
});
});

// ⭐ パワーエサ3つ
for(let i=0;i<3;i++){
let f=foods[Math.floor(Math.random()*foods.length)];
powers.push({x:f.x,y:f.y});
}

}

// ===== 入力 =====
function setDir(dx,dy){
nextDir={dx,dy};

if(dx===1) pac.dir=0;
if(dx===-1) pac.dir=Math.PI;
if(dy===1) pac.dir=Math.PI/2;
if(dy===-1) pac.dir=-Math.PI/2;
}

document.querySelector(".up").onclick=()=>setDir(0,-1);
document.querySelector(".down").onclick=()=>setDir(0,1);
document.querySelector(".left").onclick=()=>setDir(-1,0);
document.querySelector(".right").onclick=()=>setDir(1,0);

// ===== 壁 =====
function wall(x,y){
if(y<0||y>=map.length)return true;
if(x<0||x>=map[0].length)return true;
return map[y][x]==="#";
}

// ===== 更新 =====
function update(){

if(state!=="play") return;

// ⭐ 先行入力
let tx=pac.x+nextDir.dx;
let ty=pac.y+nextDir.dy;
if(!wall(tx,ty)){
pac.dx=nextDir.dx;
pac.dy=nextDir.dy;
}

let nx=pac.x+pac.dx;
let ny=pac.y+pac.dy;
if(!wall(nx,ny)){
pac.x=nx;
pac.y=ny;
}

// 食べ物
foods=foods.filter(f=>{
if(f.x===pac.x&&f.y===pac.y){
score+=10;
return false;
}
return true;
});

// ⭐ パワー
powers=powers.filter(p=>{
if(p.x===pac.x&&p.y===pac.y){
powerMode=true;
powerTimer=300;
score+=50;
return false;
}
return true;
});

if(powerMode){
powerTimer--;
if(powerTimer<=0) powerMode=false;
}

// ゴースト
ghosts.forEach(g=>{

if(powerMode){
g.x+=Math.sign(g.x-pac.x);
g.y+=Math.sign(g.y-pac.y);
}else{
g.x+=Math.sign(pac.x-g.x);
g.y+=Math.sign(pac.y-g.y);
}

if(g.x===pac.x&&g.y===pac.y){
if(powerMode){
score+=200;
g.x=10;g.y=8;
}else{
life--;
pac.x=1;pac.y=1;
}
}
});

// クリア
if(foods.length===0){
stage=(stage+1)%5;
init();
}

}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="title"){
ctx.fillStyle="yellow";
ctx.font="bold 80px sans-serif";
ctx.fillText("PACMAN",canvas.width*0.1,200);
ctx.font="40px sans-serif";
ctx.fillText("Tap to Start",canvas.width*0.2,300);
return;
}

let ox=(canvas.width-map[0].length*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

// 壁（レンガ）
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){
ctx.fillStyle="#8B4513";
ctx.fillRect(ox+x*grid,oy+y*grid,grid,grid);
}
});
});

// 食べ物
foods.forEach(f=>{
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ox+f.x*grid+grid/2,oy+f.y*grid+grid/2,grid/6,0,Math.PI*2);
ctx.fill();
});

// ⭐ パワーエサ
powers.forEach(p=>{
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(ox+p.x*grid+grid/2,oy+p.y*grid+grid/2,grid/3,0,Math.PI*2);
ctx.fill();
});

// パックマン
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(
ox+pac.x*grid+grid/2,
oy+pac.y*grid+grid/2,
grid/2,
pac.dir+0.3,
pac.dir+Math.PI*2-0.3
);
ctx.lineTo(ox+pac.x*grid+grid/2,oy+pac.y*grid+grid/2);
ctx.fill();

// ゴースト
ghosts.forEach(g=>{
ctx.fillStyle=powerMode?"blue":"red";
ctx.beginPath();
ctx.arc(ox+g.x*grid+grid/2,oy+g.y*grid+grid/2,grid/2,0,Math.PI*2);
ctx.fill();
});

// ⭐ スコア強化
ctx.font="bold 32px sans-serif";
ctx.fillText("Score: "+score,20,50);
ctx.fillText("Stage: "+(stage+1),20,90);

// ❤️
for(let i=0;i<life;i++){
ctx.fillText("❤️",20+i*35,130);
}

}

// ===== ループ =====
setInterval(()=>{
update();
draw();
},140);

// スタート
canvas.addEventListener("touchstart",()=>{
if(state==="title"){
state="play";
init();
document.getElementById("pad").style.display="block";
}
});

</script>
</body>
</html>
