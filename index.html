<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Ultimate+</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:
radial-gradient(circle at 30% 30%, #1a1a1a, #000),
repeating-linear-gradient(45deg,#111 0,#111 8px,#000 8px,#000 16px);
color:white;
}

canvas{display:block;}

/* UI */
#ui{
position:absolute;
top:10px;
left:15px;
font-size:28px; /* ④大きく */
font-weight:bold;
}

/* ライフ表示 */
#life{
position:absolute;
top:50px;
left:15px;
font-size:24px;
}

/* 🎮 コントローラー（大きく＆離す） */
#pad{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:260px;
height:260px;
}

.btn{
position:absolute;
width:90px;
height:90px;
border-radius:20px;
background:rgba(255,255,255,0.15);
border:2px solid rgba(255,255,255,0.5);
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
}

/* 十字配置（距離広げた） */
.up{top:0;left:85px;}
.down{bottom:0;left:85px;}
.left{left:0;top:85px;}
.right{right:0;top:85px;}

</style>
</head>

<body>

<div id="ui"></div>
<div id="life"></div>

<canvas id="game"></canvas>

<div id="pad">
<div class="btn up">⬆️</div>
<div class="btn down">⬇️</div>
<div class="btn left">⬅️</div>
<div class="btn right">➡️</div>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let grid=Math.floor(canvas.width/21);

let state="title";
let score=0;
let hiScore=localStorage.getItem("hi")||0;
let stage=1;
let life=5; // ①

let pac={x:1,y:1,dx:0,dy:0,dir:0,anim:0};
let ghosts=[];
let foods=[];
let map=[];
let power=false;
let powerTimer=0;

let audioCtx=new (window.AudioContext||window.webkitAudioContext)();

// 音
function beep(freq){
let o=audioCtx.createOscillator();
o.frequency.value=freq;
o.connect(audioCtx.destination);
o.start();
setTimeout(()=>o.stop(),100);
}

const base=[ /* 省略せずそのまま前回と同じ */ 
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o###.###.#.###.###o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.### # ###.#####",
"#.........P.........#",
"#...................#",
"#.###.#####.#####.###",
"#o.................o#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.######### #########",
"#...................#",
"#.###.###.#.###.###.#",
"#.........#.........#",
"#####################"
];

function init(){
map=[...base];
foods=[];
ghosts=[
{x:10,y:8,c:"red"},
{x:9,y:8,c:"pink"},
{x:11,y:8,c:"cyan"},
{x:10,y:7,c:"orange"}
];

map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="."||c==="o") foods.push({x,y,p:c==="o"});
if(c==="P"){pac.x=x;pac.y=y;}
});
});
}

function move(o){
let nx=o.x+o.dx;
let ny=o.y+o.dy;
if(nx<0) nx=map[0].length-1;
if(nx>=map[0].length) nx=0;
if(map[ny][nx]!=="#"){
o.x=nx;o.y=ny;
}
}

function update(){

if(state==="title") return;

move(pac);

// 方向保存（②）
if(pac.dx===1) pac.dir=0;
if(pac.dy===1) pac.dir=Math.PI/2;
if(pac.dx===-1) pac.dir=Math.PI;
if(pac.dy===-1) pac.dir=-Math.PI/2;

// 食べ物
foods=foods.filter(f=>{
if(f.x===pac.x&&f.y===pac.y){
score+=f.p?50:10;
beep(600);

if(f.p){
power=true;
powerTimer=60;
}
return false;
}
return true;
});

// パワー
if(power){
powerTimer--;
if(powerTimer<=0) power=false;
}

// ゴースト（少し賢く）
ghosts.forEach(g=>{
let dx=pac.x-g.x;
let dy=pac.y-g.y;

g.dx=Math.sign(dx);
g.dy=Math.sign(dy);

move(g);

if(g.x===pac.x&&g.y===pac.y){
if(power){
g.x=10;g.y=8;
score+=200;
beep(200);
}else{
life--;
pac.x=1;pac.y=1;

if(life<=0){
if(score>hiScore){
hiScore=score;
localStorage.setItem("hi",hiScore);
}
state="title";
score=0;
life=5;
}
}
}
});

}

// 描画
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="title"){
ctx.fillStyle="yellow";
ctx.font="bold 48px sans-serif";
ctx.fillText("PAC-MAN",canvas.width/2-120,200);
ctx.fillText("TAP",canvas.width/2-50,260);
return;
}

let ox=(canvas.width-map[0].length*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

// 壁
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){
ctx.fillStyle="#8B4513";
ctx.fillRect(ox+x*grid,oy+y*grid,grid,grid);
}
});
});

// エサ
foods.forEach(f=>{
ctx.fillStyle=f.p?"yellow":"white";
ctx.beginPath();
ctx.arc(ox+f.x*grid+grid/2,oy+f.y*grid+grid/2,grid*0.25,0,Math.PI*2);
ctx.fill();
});

// パックマン（②方向）
pac.anim+=0.2;
let m=Math.abs(Math.sin(pac.anim))*0.5;

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.moveTo(ox+pac.x*grid+grid/2,oy+pac.y*grid+grid/2);
ctx.arc(
ox+pac.x*grid+grid/2,
oy+pac.y*grid+grid/2,
grid*0.45,
pac.dir+m,
pac.dir+Math.PI*2-m
);
ctx.fill();

// ゴースト
ghosts.forEach(g=>{
ctx.fillStyle=power?"blue":g.c;
ctx.beginPath();
ctx.arc(ox+g.x*grid+grid/2,oy+g.y*grid+grid/2,grid*0.45,0,Math.PI*2);
ctx.fill();
});

// UI
document.getElementById("ui").innerText=
`Score:${score}  Hi:${hiScore}`;

// ① ライフをパックマンで表示
let lifeStr="";
for(let i=0;i<life;i++) lifeStr+="🟡";
document.getElementById("life").innerText=lifeStr;

}

// 操作
document.querySelector(".up").onclick=()=>{pac.dx=0;pac.dy=-1;}
document.querySelector(".down").onclick=()=>{pac.dx=0;pac.dy=1;}
document.querySelector(".left").onclick=()=>{pac.dx=-1;pac.dy=0;}
document.querySelector(".right").onclick=()=>{pac.dx=1;pac.dy=0;}

setInterval(()=>{
update();
draw();
},200);

canvas.addEventListener("touchstart",()=>{
if(state==="title"){
init();
state="play";
}
});

</script>
</body>
</html>
