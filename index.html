<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Neo Ultimate</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont;
background:radial-gradient(circle at 50% 30%, #111, #000);
color:white;
}

canvas{display:block;}

/* UI */
#uiBox{
position:absolute;
top:15px;
left:15px;
background:rgba(0,0,0,0.5);
padding:12px 18px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,255,255,0.3);
}

#score{font-size:20px;}
#life{font-size:22px;margin-top:5px;}

/* タイトル */
<div id="title">
<h1 style="font-size:12vw;">PACMAN</h1>
<button id="startBtn" style="font-size:6vw;">Game Start</button>
</div>

/* コントローラー */
#pad{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:280px;
height:280px;
}

.btn{
position:absolute;
width:90px;
height:90px;
border-radius:25px;
background:linear-gradient(145deg,#222,#111);
box-shadow:0 0 15px #0ff,inset 0 0 10px #0ff3;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
}
.btn:active{transform:scale(0.9);}

.up{top:0;left:95px;}
.down{bottom:0;left:95px;}
.left{left:0;top:95px;}
.right{right:0;top:95px;}
</style>
</head>

<body>

<div id="uiBox">
<div id="score"></div>
<div id="life"></div>
</div>

<div id="title">
<h1>PACMAN</h1>
<p>Tap to Start</p>
</div>

<canvas id="game"></canvas>

<div id="pad">
<div class="btn up">⬆️</div>
<div class="btn down">⬇️</div>
<div class="btn left">⬅️</div>
<div class="btn right">➡️</div>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let grid = Math.min(
  Math.floor(canvas.width / 21),
  Math.floor(canvas.height / map.length)
);

// 音
const audio=new (window.AudioContext||window.webkitAudioContext)();
function play(f){
let o=audio.createOscillator();
o.frequency.value=f;
o.connect(audio.destination);
o.start();
setTimeout(()=>o.stop(),80);
}

// BGM
let bgm;
function startBGM(){
bgm=setInterval(()=>{
play(300);
setTimeout(()=>play(500),100);
setTimeout(()=>play(700),200);
},600);
}
function stopBGM(){clearInterval(bgm);}

// 状態
let state="title";
let stage=0;
let score=0;
let life=5;

let pac={x:1,y:1,dx:0,dy:0,dir:0,anim:0};
let ghosts=[];
let foods=[];
let map=[];

// ===== 5ステージ（全部21幅）=====
const stages=[

[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o........P........o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.###.#.###.#####",
"#...................#",
"#####################"
],

[
"#####################",
"#...................#",
"#.#####.###.#####.#.#",
"#....P............#.#",
"#.#####.###.#####.#.#",
"#...................#",
"#.#####.###.#####.#.#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#..#.....#.....#....#",
"#..#.###.#.###.#.##.#",
"#P.................o#",
"#..#.###.#.###.#.##.#",
"#..#.....#.....#....#",
"#..#####.#.#####....#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#...................#",
"#.###.#####.###.###.#",
"#P.................o#",
"#.###.#####.###.###.#",
"#...................#",
"#.###.#####.###.###.#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#.#.#.#.#.#.#.#.#.#.#",
"#........P.........o#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#####################"
]

];

// 初期化
function init(){
map=[...stages[stage]];
foods=[];
ghosts=[
{x:10,y:3,dx:1,dy:0},
{x:9,y:3,dx:-1,dy:0}
];

map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="."||c==="o") foods.push({x,y});
if(c==="P"){pac.x=x;pac.y=y;}
});
});
}

// 壁
function wall(x,y){
return map[y][x]==="#";
}

// 移動
function move(o){
let nx=o.x+o.dx;
let ny=o.y+o.dy;

if(nx<0) nx=20;
if(nx>20) nx=0;

if(!wall(nx,ny)){
o.x=nx;o.y=ny;
}
}

// 更新
function update(){

if(state!=="play") return;

move(pac);

// 向き
if(pac.dx===1) pac.dir=0;
if(pac.dx===-1) pac.dir=Math.PI;
if(pac.dy===1) pac.dir=Math.PI/2;
if(pac.dy===-1) pac.dir=-Math.PI/2;

// エサ
foods=foods.filter(f=>{
if(f.x===pac.x&&f.y===pac.y){
score+=10;
play(700);
return false;
}
return true;
});

// ゴースト
ghosts.forEach(g=>{
g.dx=Math.sign(pac.x-g.x);
g.dy=Math.sign(pac.y-g.y);

move(g);

if(g.x===pac.x&&g.y===pac.y){
life--;
play(200);

if(life<=0){
state="title";
life=5;
score=0;
stage=0;
stopBGM();
document.getElementById("title").style.display="block";
}else{
pac.x=1;pac.y=1;
}
}
});

// クリア → 次ステージ
if(foods.length===0){
play(1000);
stage=(stage+1)%5;
init();
}

}

// 描画
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="title") return;

let ox=(canvas.width-21*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

// 壁（ネオン）
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){
ctx.fillStyle="#0ff";
ctx.shadowColor="#0ff";
ctx.shadowBlur=10;
ctx.fillRect(ox+x*grid,oy+y*grid,grid,grid);
}
});
});

// エサ
ctx.shadowBlur=0;
foods.forEach(f=>{
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ox+f.x*grid+grid/2,oy+f.y*grid+grid/2,grid*0.2,0,Math.PI*2);
ctx.fill();
});

// パックマン
pac.anim+=0.2;
let m=Math.abs(Math.sin(pac.anim))*0.5;

ctx.shadowColor="yellow";
ctx.shadowBlur=20;

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.moveTo(ox+pac.x*grid+grid/2,oy+pac.y*grid+grid/2);
ctx.arc(
ox+pac.x*grid+grid/2,
oy+pac.y*grid+grid/2,
grid*0.45,
pac.dir+m,
pac.dir+Math.PI*2-m
);
ctx.fill();

ctx.shadowBlur=0;

// ゴースト
ghosts.forEach(g=>{
ctx.fillStyle="red";
ctx.shadowColor="red";
ctx.shadowBlur=15;
ctx.beginPath();
ctx.arc(ox+g.x*grid+grid/2,oy+g.y*grid+grid/2,grid*0.45,0,Math.PI*2);
ctx.fill();
ctx.shadowBlur=0;
});

// UI
document.getElementById("score").innerText=
"Score: "+score+"  Stage: "+(stage+1);

document.getElementById("life").innerText="❤️".repeat(life);

}

// ループ
setInterval(()=>{
update();
draw();
},180);

// スタート
canvas.addEventListener("touchstart",()=>{
if(state==="title"){
play(900);
init();
state="play";
startBGM();
document.getElementById("title").style.display="none";
}
});

// 操作
document.querySelector(".up").onclick=()=>{pac.dx=0;pac.dy=-1;}
document.querySelector(".down").onclick=()=>{pac.dx=0;pac.dy=1;}
document.querySelector(".left").onclick=()=>{pac.dx=-1;pac.dy=0;}
document.querySelector(".right").onclick=()=>{pac.dx=1;pac.dy=0;}

</script>
</body>
</html>
