<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Neo Ultimate FINAL</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont;
background:radial-gradient(circle at 50% 30%, #111, #000);
color:white;
}

canvas{display:block;}

#uiBox{
position:absolute;
top:15px;
left:15px;
background:rgba(0,0,0,0.5);
padding:12px 18px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(0,255,255,0.3);
}

#score{font-size:20px;}
#hi{font-size:16px;}
#life{font-size:22px;}

#reset{
margin-top:5px;
padding:5px 10px;
border:none;
border-radius:8px;
background:#ff4444;
color:white;
}

/* タイトル */
#title{
position:absolute;
top:30%;
width:100%;
text-align:center;
color:#0ff;
text-shadow:0 0 20px #0ff;
}
#title h1{font-size:60px;}
#title button{
font-size:24px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#0ff;
color:black;
}

/* コントローラー */
#pad{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:280px;
height:280px;
}
.btn{
position:absolute;
width:90px;
height:90px;
border-radius:25px;
background:#222;
box-shadow:0 0 15px #0ff;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
}
.up{top:0;left:95px;}
.down{bottom:0;left:95px;}
.left{left:0;top:95px;}
.right{right:0;top:95px;}
</style>
</head>

<body>

<div id="uiBox">
<div id="score"></div>
<div id="hi"></div>
<div id="life"></div>
<button id="reset">リセット</button>
</div>

<div id="title">
<h1>PACMAN</h1>
<button id="startBtn">Game Start</button>
</div>

<canvas id="game"></canvas>

<div id="pad">
<div class="btn up">⬆️</div>
<div class="btn down">⬇️</div>
<div class="btn left">⬅️</div>
<div class="btn right">➡️</div>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let grid=Math.floor(canvas.width/21);

// 🎵 BGM
const bgm=new Audio("bgm.mp3");
bgm.loop=true;

// 効果音
const audio=new (window.AudioContext||window.webkitAudioContext)();
function play(f){
let o=audio.createOscillator();
o.frequency.value=f;
o.connect(audio.destination);
o.start();
setTimeout(()=>o.stop(),80);
}

// 状態
let state="title";
let stage=0;
let score=0;
let hiScore=localStorage.getItem("hiScore")||0;
let life=5;

let pac={x:1,y:1,dx:0,dy:0,dir:0,anim:0};
let ghosts=[];
let foods=[];
let map=[];

// ===== 5ステージ =====
const stages=[

[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o........P........o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.###.#.###.#####",
"#...................#",
"#####################"
],

[
"#####################",
"#...................#",
"#.#####.###.#####.#.#",
"#....P............#.#",
"#.#####.###.#####.#.#",
"#...................#",
"#.#####.###.#####.#.#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#..#.....#.....#....#",
"#..#.###.#.###.#.##.#",
"#P.................o#",
"#..#.###.#.###.#.##.#",
"#..#.....#.....#....#",
"#..#####.#.#####....#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#...................#",
"#.###.#####.###.###.#",
"#P.................o#",
"#.###.#####.###.###.#",
"#...................#",
"#.###.#####.###.###.#",
"#...................#",
"#...................#",
"#####################"
],

[
"#####################",
"#.#.#.#.#.#.#.#.#.#.#",
"#........P.........o#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#.#.#.#.#.#.#.#.#.#.#",
"#...................#",
"#####################"
]

];

// 初期化
function init(){
map=[...stages[stage]];
foods=[];
ghosts=[{x:10,y:3,dx:1,dy:0}];

map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="."||c==="o") foods.push({x,y});
if(c==="P"){pac.x=x;pac.y=y;}
});
});
}

// 壁
function wall(x,y){
return map[y][x]==="#";
}

// 移動
function move(o){
let nx=o.x+o.dx;
let ny=o.y+o.dy;

if(nx<0) nx=20;
if(nx>20) nx=0;

if(!wall(nx,ny)){
o.x=nx;o.y=ny;
}
}

// 更新
function update(){

if(state!=="play") return;

move(pac);

// エサ
foods=foods.filter(f=>{
if(f.x===pac.x&&f.y===pac.y){
score+=10;
return false;
}
return true;
});

// ゴースト
ghosts.forEach(g=>{
g.dx=Math.sign(pac.x-g.x);
g.dy=Math.sign(pac.y-g.y);
move(g);

if(g.x===pac.x&&g.y===pac.y){
life--;

if(life<=0){
if(score>hiScore){
hiScore=score;
localStorage.setItem("hiScore",hiScore);
}
state="title";
life=5;
score=0;
stage=0;
bgm.pause();
document.getElementById("title").style.display="block";
}else{
pac.x=1;pac.y=1;
}
}
});

// クリア
if(foods.length===0){
stage=(stage+1)%5;
init();
}

}

// 描画
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="title") return;

let ox=(canvas.width-21*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

// 壁
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){
ctx.fillStyle="#0ff";
ctx.fillRect(ox+x*grid,oy+y*grid,grid,grid);
}
});
});

// エサ
foods.forEach(f=>{
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ox+f.x*grid+grid/2,oy+f.y*grid+grid/2,grid*0.2,0,Math.PI*2);
ctx.fill();
});

// パックマン
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(ox+pac.x*grid+grid/2,oy+pac.y*grid+grid/2,grid*0.4,0,Math.PI*2);
ctx.fill();

// UI
document.getElementById("score").innerText="Score: "+score;
document.getElementById("hi").innerText="HI: "+hiScore;
document.getElementById("life").innerText="❤️".repeat(life);

}

// ループ
setInterval(()=>{
update();
draw();
},180);

// スタート
document.getElementById("startBtn").onclick=()=>{
init();
state="play";
bgm.play();
document.getElementById("title").style.display="none";
};

// リセット
document.getElementById("reset").onclick=()=>{
localStorage.removeItem("hiScore");
hiScore=0;
};

document.querySelector(".up").onclick=()=>{pac.dx=0;pac.dy=-1;}
document.querySelector(".down").onclick=()=>{pac.dx=0;pac.dy=1;}
document.querySelector(".left").onclick=()=>{pac.dx=-1;pac.dy=0;}
document.querySelector(".right").onclick=()=>{pac.dx=1;pac.dy=0;}

</script>
</body>
</html>
