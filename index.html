<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Fixed</title>
<style>
body{margin:0;background:black;overflow:hidden;}
canvas{display:block;}
#start{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:30px;
}
</style>
</head>
<body>

<div id="start">TAP TO START</div>
<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let grid = Math.floor(canvas.width/21);

let state="title";

let pac={x:1,y:1,dx:0,dy:0};
let ghosts=[];
let foods=[];
let map=[];

const base=[
"#####################",
"#.........#.........#",
"#...................#",
"#.........P.........#",
"#...................#",
"#####################"
];

// ===== 初期化 =====
function init(){

map=[...base];
foods=[];

ghosts=[
{x:10,y:3,c:"red",dx:1,dy:0}
];

map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c===".") foods.push({x,y});
if(c==="P"){pac.x=x;pac.y=y;}
});
});
}

// ===== 壁 =====
function wall(x,y){
if(y<0||y>=map.length)return true;
if(x<0||x>=map[0].length)return true;
return map[y][x]==="#";
}

// ===== 移動 =====
function move(o){
let nx=o.x+o.dx;
let ny=o.y+o.dy;
if(!wall(nx,ny)){
o.x=nx; o.y=ny;
}
}

// ===== 操作 =====
canvas.addEventListener("touchstart", startGame);
canvas.addEventListener("click", startGame);

function startGame(){
if(state==="title"){
init();
state="play";
document.getElementById("start").style.display="none";
}
}

// ===== 更新 =====
function update(){

if(state!=="play") return;

move(pac);

foods=foods.filter(f=>{
if(f.x===pac.x&&f.y===pac.y){
return false;
}
return true;
});

ghosts.forEach(g=>{
move(g);
});

}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="title") return;

let ox=(canvas.width-map[0].length*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

// 壁
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){
ctx.fillStyle="blue";
ctx.fillRect(ox+x*grid,oy+y*grid,grid,grid);
}
});
});

// エサ
foods.forEach(f=>{
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ox+f.x*grid+10,oy+f.y*grid+10,3,0,Math.PI*2);
ctx.fill();
});

// パックマン
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(ox+pac.x*grid+10,oy+pac.y*grid+10,8,0,Math.PI*2);
ctx.fill();

// ゴースト
ghosts.forEach(g=>{
ctx.fillStyle=g.c;
ctx.beginPath();
ctx.arc(ox+g.x*grid+10,oy+g.y*grid+10,8,0,Math.PI*2);
ctx.fill();
});

}

// ===== ループ =====
setInterval(()=>{
update();
draw();
},150);

</script>
</body>
</html>
