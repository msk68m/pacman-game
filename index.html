<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Pro</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
color:white;
}

canvas{
display:block;
}

/* 🎮 コントローラー */
#pad{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:200px;
height:200px;
}

.btn{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(5px);
border:2px solid rgba(255,255,255,0.3);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:white;
}

.up{top:0;left:70px;}
.down{bottom:0;left:70px;}
.left{left:0;top:70px;}
.right{right:0;top:70px;}
</style>

</head>

<body>

<canvas id="game"></canvas>

<!-- 🎮 コントローラー -->
<div id="pad">
<div class="btn up">▲</div>
<div class="btn down">▼</div>
<div class="btn left">◀</div>
<div class="btn right">▶</div>
</div>

<script>

// ===== 画面 =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let grid = Math.floor(canvas.width/21);

// ===== 状態 =====
let state="title";
let score=0;
let stage=1;
let life=3;
let speed=140;

let pac={x:1,y:1,dx:0,dy:0};
let ghosts=[];
let foods=[];
let map=[];

// ===== マップ =====
const base=[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o###.###.#.###.###o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.### # ###.#####",
"#.........P.........#",
"#...................#",
"#.###.#####.#####.###",
"#o.................o#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.######### #########",
"#...................#",
"#.###.###.#.###.###.#",
"#.........#.........#",
"#####################"
];

// ===== 初期化 =====
function init(){

map=[...base];
foods=[];

ghosts=[
{x:10,y:8,c:"red"},
{x:9,y:8,c:"pink"},
{x:11,y:8,c:"cyan"},
{x:10,y:7,c:"orange"}
];

map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="."||c==="o") foods.push({x,y,p:c==="o"});
if(c==="P"){pac.x=x;pac.y=y;}
});
});
}

// ===== コントローラー =====
document.querySelector(".up").onclick=()=>{pac.dx=0;pac.dy=-1;}
document.querySelector(".down").onclick=()=>{pac.dx=0;pac.dy=1;}
document.querySelector(".left").onclick=()=>{pac.dx=-1;pac.dy=0;}
document.querySelector(".right").onclick=()=>{pac.dx=1;pac.dy=0;}

// ===== 壁 =====
function wall(x,y){
if(y<0||y>=map.length)return true;
if(x<0||x>=map[0].length)return true;
return map[y][x]==="#";
}

// ===== 移動 =====
function move(o){

let nx=o.x+o.dx;
let ny=o.y+o.dy;

// ワープ
if(nx<0) nx=map[0].length-1;
if(nx>=map[0].length) nx=0;

if(!wall(nx,ny)){
o.x=nx;
o.y=ny;
}
}

// ===== AI =====
function getTarget(g){

if(g.c==="red") return {x:pac.x,y:pac.y};

if(g.c==="pink"){
return {x:pac.x+pac.dx*4,y:pac.y+pac.dy*4};
}

if(g.c==="cyan"){
return {x:pac.x+(Math.random()*6-3),y:pac.y+(Math.random()*6-3)};
}

let dist=Math.abs(pac.x-g.x)+Math.abs(pac.y-g.y);

if(dist<5){
return {x:1,y:1};
}else{
return {x:pac.x,y:pac.y};
}
}

// ===== 更新 =====
function update(){

if(state==="title") return;

move(pac);

// 食べ物
foods=foods.filter(f=>{
if(f.x===pac.x&&f.y===pac.y){
score+=10;
return false;
}
return true;
});

// 👻
ghosts.forEach(g=>{

let target=getTarget(g);

let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
let best=null;
let bestD=9999;

for(let d of dirs){

let nx=g.x+d[0];
let ny=g.y+d[1];

if(wall(nx,ny)) continue;

let dist=Math.abs(target.x-nx)+Math.abs(target.y-ny);

if(dist<bestD){
bestD=dist;
best=d;
}
}

if(best){
g.dx=best[0];
g.dy=best[1];
}

move(g);

// 衝突
if(g.x===pac.x&&g.y===pac.y){
life--;
pac.x=1; pac.y=1;

if(life<=0){
state="title";
}
}

});

// クリア
if(foods.length===0){
stage++;
if(stage>10) stage=1;
init();
}

}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="title"){
ctx.fillStyle="yellow";
ctx.font="40px sans-serif";
ctx.fillText("PACMAN",canvas.width/2-90,200);
ctx.fillText("Tap to Start",canvas.width/2-110,260);
return;
}

let ox=(canvas.width-map[0].length*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

// 壁
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){
ctx.fillStyle="blue";
ctx.fillRect(ox+x*grid,oy+y*grid,grid,grid);
}
});
});

// 食べ物
foods.forEach(f=>{
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ox+f.x*grid+10,oy+f.y*grid+10,3,0,Math.PI*2);
ctx.fill();
});

// パックマン
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(ox+pac.x*grid+10,oy+pac.y*grid+10,8,0,Math.PI*2);
ctx.fill();

// ゴースト
ghosts.forEach(g=>{
ctx.fillStyle=g.c;
ctx.beginPath();
ctx.arc(ox+g.x*grid+10,oy+g.y*grid+10,8,0,Math.PI*2);
ctx.fill();
});

// UI
ctx.fillStyle="white";
ctx.fillText("Score:"+score,20,30);
ctx.fillText("Life:"+life,20,60);
ctx.fillText("Stage:"+stage,20,90);

}

// ===== ループ =====
setInterval(()=>{
update();
draw();
},speed);

// スタート
canvas.addEventListener("touchstart",()=>{
if(state==="title"){
init();
state="play";
}
});

</script>
</body>
</html>
