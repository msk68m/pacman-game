<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pacman Ultimate</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
color:white;
}

/* 背景（少しオシャレ） */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%,#222 0%,transparent 40%),
radial-gradient(circle at 80% 70%,#111 0%,transparent 40%);
z-index:-1;
}

/* キャンバス */
canvas{
display:block;
}

/* 🎮 コントローラー */
#pad{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
width:260px;
height:260px;
display:none;
}

.btn{
position:absolute;
width:80px;
height:80px;
border-radius:20px;
background:rgba(255,255,255,0.15);
border:2px solid rgba(255,255,255,0.3);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

.up{top:0;left:90px;}
.down{bottom:0;left:90px;}
.left{left:0;top:90px;}
.right{right:0;top:90px;}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="pad">
<div class="btn up">▲</div>
<div class="btn down">▼</div>
<div class="btn left">◀</div>
<div class="btn right">▶</div>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let grid=Math.floor(canvas.width/21);

// ===== 状態 =====
let state="title";
let score=0;
let stage=0;
let life=5;

let pac={x:1,y:1,dx:0,dy:0,dir:0};
let ghosts=[];
let foods=[];
let map=[];

const stages=[

// 5面（全部同サイズ）
[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o###.###.#.###.###o#",
"#...................#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#####.###   ###.#####",
"#.........P.........#",
"#...................#",
"#.###.#####.#####.###",
"#o.................o#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.######### #########",
"#...................#",
"#.###.###.#.###.###.#",
"#.........#.........#",
"#####################"
],

[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o.................o#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.######### #########",
"#.........P.........#",
"#.######### #########",
"#.....#...#...#.....#",
"#.###.#.#####.#.###.#",
"#o.................o#",
"#.###.###.#.###.###.#",
"#.........#.........#",
"#####################"
],

[
"#####################",
"#o.................o#",
"#.###.#####.#####.###",
"#.....#...#...#.....#",
"#.###.#.#####.#.###.#",
"#.........P.........#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.###.#####.#####.###",
"#o.................o#",
"#####################"
],

[
"#####################",
"#.........#.........#",
"#.###.###.#.###.###.#",
"#o.................o#",
"#.###.#.#####.#.###.#",
"#.....#...P...#.....#",
"#.######### #########",
"#...................#",
"#.######### #########",
"#.....#.....#.......#",
"#.###.#.#####.#.###.#",
"#o.................o#",
"#.###.###.#.###.###.#",
"#.........#.........#",
"#####################"
],

[
"#####################",
"#o.................o#",
"#.###.#####.#####.###",
"#.....#...#...#.....#",
"#.###.#.#####.#.###.#",
"#.........P.........#",
"#.###.#.#####.#.###.#",
"#.....#...#...#.....#",
"#.###.#####.#####.###",
"#o.................o#",
"#####################"
]

];

// ===== 初期化 =====
function init(){
map=[...stages[stage]];
foods=[];
ghosts=[
{x:10,y:8,c:"red"},
{x:9,y:8,c:"pink"},
{x:11,y:8,c:"cyan"},
{x:10,y:7,c:"orange"}
];

map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="."||c==="o") foods.push({x,y});
if(c==="P"){pac.x=x;pac.y=y;}
});
});
}

// ===== 入力 =====
function setDir(dx,dy){
pac.dx=dx;
pac.dy=dy;

if(dx===1) pac.dir=0;
if(dx===-1) pac.dir=Math.PI;
if(dy===1) pac.dir=Math.PI/2;
if(dy===-1) pac.dir=-Math.PI/2;
}

document.querySelector(".up").onclick=()=>setDir(0,-1);
document.querySelector(".down").onclick=()=>setDir(0,1);
document.querySelector(".left").onclick=()=>setDir(-1,0);
document.querySelector(".right").onclick=()=>setDir(1,0);

// ===== 壁 =====
function wall(x,y){
if(y<0||y>=map.length)return true;
if(x<0||x>=map[0].length)return true;
return map[y][x]==="#";
}

// ===== 更新 =====
function update(){

if(state!=="play") return;

let nx=pac.x+pac.dx;
let ny=pac.y+pac.dy;

if(!wall(nx,ny)){
pac.x=nx;
pac.y=ny;
}

// 食べ物
foods=foods.filter(f=>{
if(f.x===pac.x&&f.y===pac.y){
score+=10;
return false;
}
return true;
});

// ゴースト
ghosts.forEach(g=>{
let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
let d=dirs[Math.floor(Math.random()*4)];
if(!wall(g.x+d[0],g.y+d[1])){
g.x+=d[0];
g.y+=d[1];
}

// 衝突
if(g.x===pac.x&&g.y===pac.y){
life--;
pac.x=1; pac.y=1;

if(life<=0){
state="title";
life=5;
score=0;
stage=0;
}
}
});

// クリア
if(foods.length===0){
stage=(stage+1)%5;
init();
}
}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==="title"){
ctx.fillStyle="yellow";
ctx.font="bold 80px sans-serif";
ctx.fillText("PACMAN",canvas.width*0.1,200);

ctx.font="40px sans-serif";
ctx.fillText("Game Start",canvas.width*0.25,300);
return;
}

let ox=(canvas.width-map[0].length*grid)/2;
let oy=(canvas.height-map.length*grid)/2;

// 壁（レンガ風）
map.forEach((r,y)=>{
[...r].forEach((c,x)=>{
if(c==="#"){
ctx.fillStyle="#8B4513";
ctx.fillRect(ox+x*grid,oy+y*grid,grid,grid);
}
});
});

// 食べ物
foods.forEach(f=>{
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(ox+f.x*grid+grid/2,oy+f.y*grid+grid/2,grid/6,0,Math.PI*2);
ctx.fill();
});

// パックマン
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(
ox+pac.x*grid+grid/2,
oy+pac.y*grid+grid/2,
grid/2,
pac.dir+0.3,
pac.dir+Math.PI*2-0.3
);
ctx.lineTo(ox+pac.x*grid+grid/2,oy+pac.y*grid+grid/2);
ctx.fill();

// ゴースト
ghosts.forEach(g=>{
ctx.fillStyle=g.c;
ctx.beginPath();
ctx.arc(ox+g.x*grid+grid/2,oy+g.y*grid+grid/2,grid/2,0,Math.PI*2);
ctx.fill();
});

// UI
ctx.font="bold 24px sans-serif";
ctx.fillText("Score: "+score,20,40);
ctx.fillText("Stage: "+(stage+1),20,70);

// ❤️
for(let i=0;i<life;i++){
ctx.fillText("❤️",20+i*30,100);
}
}

// ===== ループ =====
setInterval(()=>{
update();
draw();
},140);

// スタート
canvas.addEventListener("touchstart",()=>{
if(state==="title"){
state="play";
init();
document.getElementById("pad").style.display="block";
}
});

</script>
</body>
</html>
